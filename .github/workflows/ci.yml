name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (black + ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linters
        run: pip install black==23.12.1 ruff==0.1.11

      - name: Check black formatting
        working-directory: backend
        run: black --check .

      - name: Check ruff rules
        working-directory: backend
        run: ruff check .

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install torch==2.2.0 --index-url https://download.pytorch.org/whl/cpu
          pip install torchaudio==2.2.0 --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Run unit tests
        working-directory: backend
        env:
          PYTHONPATH: .
        run: pytest tests/unit/ -v --tb=short -q

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install torch==2.2.0 --index-url https://download.pytorch.org/whl/cpu
          pip install torchaudio==2.2.0 --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Run integration tests
        working-directory: backend
        env:
          PYTHONPATH: .
        run: pytest tests/integration/ -v --tb=short -q

  doc-drift:
    name: Documentation Drift Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check documentation drift
        run: |
          chmod +x .claude/skills/doc-drift-check.sh
          .claude/skills/doc-drift-check.sh || echo "::warning::Documentation drift detected — run doc-drift-check.sh locally to review"

  frontend-typecheck:
    name: Frontend Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npm run type-check
